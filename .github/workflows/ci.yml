name: CI Pipeline - Odoo

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  odoo-ci:
    name: "🚛 Odoo Module Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 odoo/custom_addons/ --max-line-length=120
