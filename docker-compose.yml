# =============================================================================
# docker-compose.yml — BASE FILE (ไฟล์หลัก)
# =============================================================================
# ใช้ร่วมกับไฟล์อื่นเสมอ เช่น:
#   docker compose -f docker-compose.yml -f docker-compose.odoo.yml up -d
#
# ไฟล์นี้กำหนด:
#   - Networks กลางที่ใช้ร่วมกับ telematics-backend repo
#   - Volumes กลางสำหรับเก็บข้อมูล Odoo persistent
# =============================================================================

services:
  odoo:
    image: odoo:17
    container_name: odoo
    restart: always
    depends_on:
      - db
    volumes:
      - odoo-filestore:/var/lib/odoo
      - ./odoo/custom_addons:/mnt/extra-addons
    networks:
      - odoo-net

  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - odoo-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - odoo
    networks:
      - odoo-net
      - backend-net    # ← เชื่อมต่อ backend ได้

networks:
  odoo-net:
    external: true
  backend-net:
    external: true

volumes:
  odoo-db-data:
    external: true
  odoo-db-log:
    external: true
  odoo-filestore:
    external: true
  odoo-log:
    external: true
  nginx-log:
    external: true
