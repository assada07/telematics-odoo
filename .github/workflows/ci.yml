name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend-ci:
    name: "⚙️ Backend (FastAPI)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fleet-backend
    services:
      timescaledb:
        image: postgres:15
        env:
          POSTGRES_DB: telematics_test
          POSTGRES_USER: telematics
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      emqx:
        image: emqx/emqx:5.3.0
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt flake8 pytest pytest-cov
      - name: Lint
        run: flake8 . --max-line-length=120 --ignore=E221,W291,W292,W293,E302,E305,E501,F401,F821,E265,F841,E122,E272,E241,W504,W503
      - name: Run Tests
        env:
          DATABASE_URL: postgresql://telematics:testpassword@localhost:5432/telematics_test
          MQTT_BROKER: localhost
          MQTT_PORT: 1883
        run: pytest tests/ --cov=app --cov-fail-under=25 -v

  odoo-ci:
    name: "🚛 Odoo Module"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 odoo/ --max-line-length=120

