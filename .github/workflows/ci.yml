name: CI Pipeline - Odoo

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  odoo-ci:
    name: "🚛 Odoo Module Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 odoo/ --max-line-length=120 || true
