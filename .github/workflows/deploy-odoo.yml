name: Deploy Odoo

on:
  workflow_run:
    workflows: ["CI Pipeline - Odoo"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Sandbox แยกเก็บคอนฟิก Docker ชั่วคราวแทนการเข้าไปแก้ไฟล์หลักระบบ Mac
      - name: Prepare Docker Sandbox Configuration
        run: |
          mkdir -p .docker_fallback/cli-plugins
          echo '{"credsStore":""}' > .docker_fallback/config.json
          ln -sf "$HOME/.docker/cli-plugins/docker-compose" .docker_fallback/cli-plugins/docker-compose

      # สร้าง networks และ volumes ถ้ายังไม่มี
      - name: Create Docker networks and volumes
        run: |
          docker network create odoo-net || true
          docker network create backend-net || true
          docker volume create odoo-db-data || true
          docker volume create odoo-db-log || true
          docker volume create odoo-filestore || true
          docker volume create odoo-log || true
          docker volume create nginx-log || true

      - name: Create .env
        run: |
          printf "ODOO_DB_USER=%s\n" "${{ secrets.ODOO_DB_USER }}" > .env
          printf "ODOO_DB_PASSWORD=%s\n" "${{ secrets.ODOO_DB_PASSWORD }}" >> .env
          printf "ODOO_DB_NAME=%s\n" "${{ secrets.ODOO_DB_NAME }}" >> .env
          printf "ODOO_ADMIN_PASSWORD=%s\n" "${{ secrets.ODOO_ADMIN_PASSWORD }}" >> .env
          printf "LANG=C.UTF-8\n" >> .env

      # ปิด stack dev ก่อน กันชน port 80/443/8069 กับ prod stack
      - name: Stop dev stack if running (avoid port conflicts)
        env:
          DOCKER_CONFIG: ${{ github.workspace }}/.docker_fallback
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.odoo.yml \
            -f docker-compose.dev.yml \
            down --remove-orphans || true

      - name: Deploy Odoo (prod)
        env:
          DOCKER_CONFIG: ${{ github.workspace }}/.docker_fallback
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.odoo.yml \
            -f docker-compose.prod.yml \
            down --remove-orphans

          docker compose \
            -f docker-compose.yml \
            -f docker-compose.odoo.yml \
            -f docker-compose.prod.yml \
            up -d --build --remove-orphans

      # รอให้ Odoo container พร้อมก่อนสั่ง install/upgrade
      - name: Wait for Odoo to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' telematics-odoo 2>/dev/null | grep -q healthy; then
              echo "Odoo is healthy"
              break
            fi
            echo "Waiting for Odoo... ($i/30)"
            sleep 5
          done

      # ติดตั้ง/อัปเดต custom module ทั้งหมดอัตโนมัติ (ดึงชื่อจากโฟลเดอร์ custom_addons)
      - name: Install & Upgrade Odoo modules
        run: |
          MODULES=$(find ***/custom_addons -maxdepth 1 -mindepth 1 -type d ! -name fleet_telematics -exec basename {} \; | paste -sd, -)
          echo "Modules found: $MODULES"

          if [ -z "$MODULES" ]; then
            echo "No custom modules found, skipping."
          else
            docker exec telematics-odoo odoo \
              -i "$MODULES" \
              -u "$MODULES" \
              -d "${{ secrets.ODOO_DB_NAME }}" \
              --no-http \
              --stop-after-init
          fi

          docker compose \
            -f docker-compose.yml \
            -f docker-compose.odoo.yml \
            -f docker-compose.prod.yml \
            restart odoo
